name: Release MCPB (Claude Desktop)

# Builds the Claude Desktop extension (.mcpb) for each platform and attaches the
# bundles to the GitHub Release when a version tag is pushed (e.g. v0.1.0).
# Produces openrouter-mcp-linux.mcpb, openrouter-mcp-macos.mcpb, and
# openrouter-mcp-windows.mcpb.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mcpb:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            slug: linux
            targets: ""
          - os: macos-latest
            slug: macos
            targets: aarch64-apple-darwin,x86_64-apple-darwin
          - os: windows-latest
            slug: windows
            targets: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build and pack .mcpb
        run: node scripts/build-mcpb.mjs

      - name: Upload .mcpb artifact
        uses: actions/upload-artifact@v4
        with:
          name: openrouter-mcp-${{ matrix.slug }}
          path: dist/openrouter-mcp-${{ matrix.slug }}.mcpb

      - name: Attach .mcpb to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/openrouter-mcp-${{ matrix.slug }}.mcpb
